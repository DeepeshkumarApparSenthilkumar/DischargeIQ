# File: pytest.ini
# Owner: Likitha Shankar
# Description: Pytest defaults for DischargeIQ. Restricts discovery to
#   dischargeiq/tests, names tests as test_*.py, and adds -v --tb=short with
#   -m "not slow" so long corpus/LLM runs stay opt-in via the slow marker.
# Usage: pytest (from repo root); full corpus: pytest -m slow ...
# Environment variables required: None (tests that need keys skip or mock).
# Edge cases: slow tests are excluded by default; omit -m to include all markers.

[pytest]
testpaths = dischargeiq/tests
python_files = test_*.py

# Verbose progress (test names as they run). Drop -v if you prefer quiet.
# Exclude slow tests by default — full corpus can take hours (real LLM + DB).
# Run everything slow:  pytest -m slow dischargeiq/tests/test_all_corpus_smoke.py -v -s
addopts = -v --tb=short -m "not slow"

markers =
    slow: long-running tests (full PDF corpus); not run unless you pass -m slow
